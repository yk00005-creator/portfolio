<!DOCTYPE html>
<!--
  ──────────────────────────────────────────────────────────────
  🐋 ポートフォリオ管理アプリ（APIキー不要・完全無料版）
  ──────────────────────────────────────────────────────────────
  【株価取得の仕組み】
  Yahoo Finance の非公式 API を CORS プロキシ経由で叩いています。
  APIキー不要・登録不要・完全無料。
  ただし非公式APIなので稀に取得失敗することがあります。

  【GitHub Pages デプロイ手順】
  1. GitHub で新規リポジトリを作成（例: portfolio）
  2. このファイルを index.html としてアップロード
  3. Settings → Pages → Source: Deploy from branch
     branch: main / (root) → Save
  4. https://[username].github.io/[repo]/ で公開される
  5. スマホのブラウザで開いて「ホーム画面に追加」
  ──────────────────────────────────────────────────────────────
-->

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const SK="kujira-pf-v3", PK="kujira-px-v3";
const ls={
  get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const fmt=(n,d=0)=>n==null?"—":n.toLocaleString("ja-JP",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct=n=>n==null?"—":`${n>=0?"+":""}${n.toFixed(2)}%`;
const parseNum=s=>parseFloat(String(s||"").replace(/[,円%￥$\s]/g,""))||0;

// CSV
function parseCSVText(text){
  return text.split(/\r?\n/).filter(l=>l.trim()).map(line=>{
    const r=[];let cur="";let q=false;
    for(const ch of line){
      if(ch==='"'){q=!q;continue}
      if(ch===','&&!q){r.push(cur.trim());cur="";continue}
      cur+=ch;
    }
    r.push(cur.trim());return r;
  });
}
const cIdx=(hs,...kws)=>hs.findIndex(h=>kws.some(k=>h.toLowerCase().includes(k.toLowerCase())));
function detectBroker(headers){
  const h=headers.join("|").toLowerCase();
  if(h.includes("symbol")||h.includes("qty")||h.includes("last price"))return"moomoo";
  if(h.includes("ティッカー")||(h.includes("保有株数")&&h.includes("ドル")))return"sbi-us";
  if(h.includes("保有口数")||h.includes("ファンドコード"))return"sbi-trust";
  if(h.includes("保有株数")||h.includes("銘柄コード"))return"sbi-jp";
  if(h.includes("保有数量")&&(h.includes("取得単価")||h.includes("損益")))return"rakuten";
  return"unknown";
}
function rows2h(rows,headers,type,broker,currency){
  const cI=cIdx(headers,"銘柄コード","コード","ティッカー","symbol");
  const nI=cIdx(headers,"銘柄名","name","ファンド名");
  const qI=cIdx(headers,"保有株数","保有数量","保有口数","qty","shares");
  const aI=cIdx(headers,"平均取得単価","取得単価","avg cost");
  return rows
    .filter(r=>r.length>Math.max(cI,qI)&&r[cI]?.trim()&&!/^[-ー=\s]+$/.test(r[cI]))
    .map(r=>({
      id:crypto.randomUUID(),symbol:r[cI]?.trim()||"",
      name:nI>=0?r[nI]?.trim()||"":"",
      type,currency,broker,
      quantity:parseNum(r[qI]),avgCost:aI>=0?parseNum(r[aI]):0,
      currentPrice:null,manualPrice:null
    }));
}
// SBI約定履歴から保有株を集計
function parseSBITradeHistory(rows){
  // "約定日"を含む行をヘッダーとして探す
  const hIdx=rows.findIndex(r=>r.some(c=>c.includes("約定日")));
  if(hIdx<0)return null;
  const headers=rows[hIdx];
  const dataRows=rows.slice(hIdx+1).filter(r=>r.some(c=>c.trim()));
  const nameI=cIdx(headers,"銘柄");
  const codeI=cIdx(headers,"銘柄コード");
  const tradeI=cIdx(headers,"取引");
  const qtyI=cIdx(headers,"約定数量");
  const priceI=cIdx(headers,"約定単価");
  if(codeI<0||qtyI<0||priceI<0)return null;
  const map={};
  for(const r of dataRows){
    const code=r[codeI]?.trim();
    if(!code||!/^\d{4}$/.test(code))continue;
    const name=nameI>=0?r[nameI]?.trim()||"":"";
    const trade=r[tradeI]?.trim()||"";
    const qty=parseNum(r[qtyI]);
    const price=parseNum(r[priceI]);
    if(!qty||!price)continue;
    const isBuy=trade.includes("買");
    const isSell=trade.includes("売");
    if(!isBuy&&!isSell)continue;
    if(!map[code])map[code]={code,name,qty:0,totalCost:0};
    if(isBuy){
      map[code].totalCost+=qty*price;
      map[code].qty+=qty;
    }else{
      const avg=map[code].qty>0?map[code].totalCost/map[code].qty:0;
      map[code].qty=Math.max(0,map[code].qty-qty);
      map[code].totalCost=avg*map[code].qty;
    }
  }
  const result=Object.values(map).filter(h=>h.qty>0).map(h=>({
    id:crypto.randomUUID(),symbol:h.code,name:h.name,
    type:"jp-stock",currency:"JPY",broker:"SBI",
    quantity:h.qty,avgCost:h.qty>0?h.totalCost/h.qty:0,
    currentPrice:null,manualPrice:null
  }));
  return result.length>0?result:null;
}

function processCSV(text){
  const rows=parseCSVText(text);
  if(!rows.length)return[];
  // SBI約定履歴を先に判定
  const tradeResult=parseSBITradeHistory(rows);
  if(tradeResult)return tradeResult;
  let hIdx=0;
  for(let i=0;i<Math.min(10,rows.length);i++){if(rows[i].filter(Boolean).length>=3){hIdx=i;break}}
  const headers=rows[hIdx],dataRows=rows.slice(hIdx+1),broker=detectBroker(headers);
  if(broker==="moomoo")return rows2h(dataRows,headers,"us-stock","moomoo","USD");
  if(broker==="sbi-us")return rows2h(dataRows,headers,"us-stock","SBI","USD");
  if(broker==="sbi-jp")return rows2h(dataRows,headers,"jp-stock","SBI","JPY");
  if(broker==="rakuten"){
    const isUS=headers.join(",").includes("ドル")||headers.join(",").toLowerCase().includes("usd");
    return rows2h(dataRows,headers,isUS?"us-stock":"jp-stock","楽天",isUS?"USD":"JPY");
  }
  if(broker==="sbi-trust"){
    const cI=cIdx(headers,"ファンドコード","銘柄コード");
    const nI=cIdx(headers,"ファンド名","銘柄名");
    const qI=cIdx(headers,"保有口数");
    const aI=cIdx(headers,"取得単価","平均取得単価");
    const pI=cIdx(headers,"基準価額");
    return dataRows.filter(r=>r[cI]?.trim()).map(r=>({
      id:crypto.randomUUID(),symbol:r[cI]?.trim(),
      name:nI>=0?r[nI]?.trim():"",type:"trust",currency:"JPY",broker:"SBI",
      quantity:parseNum(r[qI]),avgCost:aI>=0?parseNum(r[aI]):0,
      currentPrice:pI>=0?parseNum(r[pI]):null,manualPrice:null
    }));
  }
  return rows2h(dataRows,headers,"jp-stock","不明","JPY");
}

// Yahoo Finance via CORS proxy
const PROXIES=[
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
async function yahooFetch(symbol){
  const url=`https://query1.finance.yahoo.com/v8/chart/${symbol}?interval=1d&range=1d`;
  for(const mkP of PROXIES){
    try{
      const res=await fetch(mkP(url),{signal:AbortSignal.timeout(8000)});
      if(!res.ok)continue;
      const data=await res.json();
      const price=data?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if(price!=null)return price;
    }catch{}
  }
  return null;
}
async function fetchAllPrices(symbols,onProgress){
  const results={};
  const chunks=[];
  for(let i=0;i<symbols.length;i+=4)chunks.push(symbols.slice(i,i+4));
  let done=0;
  for(const chunk of chunks){
    const settled=await Promise.allSettled(chunk.map(s=>yahooFetch(s)));
    settled.forEach((r,i)=>{
      results[chunk[i]]=r.status==="fulfilled"?r.value:null;
      done++;
      onProgress?.(done,symbols.length,chunk[i]);
    });
  }
  return results;
}

const yahooSym=h=>{
  if(h.type==="trust")return null;
  if(h.type==="us-stock")return h.symbol.toUpperCase();
  const c=h.symbol.replace(/\.T$/i,"");
  return /^\d{4}$/.test(c)?`${c}.T`:h.symbol;
};

function calc(h,prices,fx){
  const sym=yahooSym(h);
  let cp=h.manualPrice;
  if(!cp&&sym&&prices[sym]!=null)cp=prices[sym];
  if(!cp&&h.currentPrice!=null)cp=h.currentPrice;
  if(cp==null)return{...h,evalJPY:null,evalUSD:null,plJPY:null,plPct:null,currentPrice:null};
  const isUSD=h.currency==="USD";
  const mul=h.type==="trust"?h.quantity/10000:h.quantity;
  const evalN=cp*mul,costN=h.avgCost*mul,plN=evalN-costN;
  const evalJPY=isUSD?evalN*(fx||150):evalN;
  const evalUSD=isUSD?evalN:evalN/(fx||150);
  const plJPY=isUSD?plN*(fx||150):plN;
  const plPct=costN>0?(plN/costN)*100:null;
  return{...h,currentPrice:cp,evalJPY,evalUSD,plJPY,plPct};
}

const Dash=()=><span style={{color:"#2d4a5a"}}>—</span>;
function Modal({onClose,children}){
  return(<div className="mbg" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="mbox">{children}</div></div>);
}
const Field=({label,children})=>(<div className="fld"><label className="lbl">{label}</label>{children}</div>);
const Card=({label,main,sub,color})=>(
  <div className="card">
    <div className="cl">{label}</div>
    <div className="cv mono" style={color?{color}:{}}>{main}</div>
    {sub&&<div className="cs">{sub}</div>}
  </div>
);

function AddModal({onClose,onAdd}){
  const [f,setF]=useState({symbol:"",name:"",type:"jp-stock",quantity:"",avgCost:"",broker:"SBI",manualPrice:""});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const tmap={"jp-stock":"JPY","us-stock":"USD","trust":"JPY"};
  return(
    <Modal onClose={onClose}>
      <div className="mt">銘柄を追加</div>
      <div className="g2">
        <Field label="銘柄コード / ティッカー *">
          <input type="text" value={f.symbol} onChange={e=>s("symbol",e.target.value)} placeholder="VOO / 7203 / 2558"/>
        </Field>
        <Field label="種別">
          <select value={f.type} onChange={e=>s("type",e.target.value)}>
            <option value="jp-stock">日本株・東証ETF</option>
            <option value="us-stock">米国株・ETF</option>
            <option value="trust">投資信託</option>
          </select>
        </Field>
      </div>
      <Field label="銘柄名（任意）">
        <input type="text" value={f.name} onChange={e=>s("name",e.target.value)} placeholder="eMAXIS Slim 米国株式 など"/>
      </Field>
      <div className="g2">
        <Field label={f.type==="trust"?"保有口数 *":"保有株数 *"}>
          <input type="number" value={f.quantity} onChange={e=>s("quantity",e.target.value)} placeholder="0"/>
        </Field>
        <Field label={`平均取得単価（${tmap[f.type]}）`}>
          <input type="number" value={f.avgCost} onChange={e=>s("avgCost",e.target.value)} placeholder="0"/>
        </Field>
      </div>
      <div className="g2">
        <Field label="証券会社">
          <select value={f.broker} onChange={e=>s("broker",e.target.value)}>
            {["SBI","moomoo","楽天","その他"].map(b=><option key={b} value={b}>{b}</option>)}
          </select>
        </Field>
        {f.type==="trust"&&(
          <Field label="基準価額（手動）">
            <input type="number" value={f.manualPrice} onChange={e=>s("manualPrice",e.target.value)} placeholder="20000"/>
          </Field>
        )}
      </div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:"8px",marginTop:"16px"}}>
        <button className="btn gh" onClick={onClose}>キャンセル</button>
        <button className="btn pr" disabled={!f.symbol||!f.quantity}
          onClick={()=>onAdd({
            id:crypto.randomUUID(),symbol:f.symbol.toUpperCase(),name:f.name,
            type:f.type,currency:tmap[f.type],broker:f.broker,
            quantity:parseFloat(f.quantity),avgCost:parseFloat(f.avgCost)||0,
            currentPrice:f.manualPrice?parseFloat(f.manualPrice):null,
            manualPrice:f.manualPrice?parseFloat(f.manualPrice):null
          })}>追加</button>
      </div>
    </Modal>
  );
}

function App(){
  const [holdings,setHoldings]=useState([]);
  const [prices,setPrices]=useState({});
  const [fx,setFx]=useState(null);
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(null);
  const [failedSyms,setFailedSyms]=useState([]);
  const [error,setError]=useState(null);
  const [ready,setReady]=useState(false);
  const [showUpload,setShowUpload]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [drag,setDrag]=useState(false);
  const [ageTs,setAgeTs]=useState(null);
  const fileRef=useRef();

  useEffect(()=>{
    const h=ls.get(SK)||[];
    const p=ls.get(PK)||{};
    setHoldings(h);
    if(p.prices)setPrices(p.prices);
    if(p.fx)setFx(p.fx);
    if(p.ts)setAgeTs(p.ts);
    setReady(true);
  },[]);

  useEffect(()=>{if(ready)ls.set(SK,holdings)},[holdings,ready]);

  const refresh=useCallback(async()=>{
    if(!holdings.length||loading)return;
    setLoading(true);setError(null);setFailedSyms([]);setProgress(null);
    const syms=[...new Set(holdings.map(yahooSym).filter(Boolean))];
    const allSyms=[...syms,"USDJPY=X"];
    try{
      const result=await fetchAllPrices(allSyms,(done,total,sym)=>setProgress({done,total,sym}));
      const newFx=result["USDJPY=X"]||fx;
      const newPrices={...result};delete newPrices["USDJPY=X"];
      const failed=syms.filter(s=>result[s]==null);
      setFailedSyms(failed);
      setPrices(newPrices);
      if(newFx)setFx(newFx);
      const ts=Date.now();setAgeTs(ts);
      ls.set(PK,{prices:newPrices,fx:newFx,ts});
      if(failed.length>0&&failed.length===syms.length)
        setError("全銘柄の取得に失敗しました。しばらく待ってから再試行してください。");
    }catch(e){
      setError("価格取得に失敗しました。ネットワークを確認してください。");
    }
    setLoading(false);setProgress(null);
  },[holdings,fx,loading]);

  const handleFile=useCallback((file)=>{
    if(!file)return;
    const name=file.name.toLowerCase();
    if(!name.endsWith(".csv")&&!name.endsWith(".txt")){
      // 拡張子チェックを緩める：とりあえず読んでみる
    }
    const tryParse=enc=>{
      const reader=new FileReader();
      reader.onload=e=>{
        const text=e.target.result;
        const hasJP=/[ぁ-ん]|[ァ-ヴ]|[一-龯]/.test(text);
        if(!hasJP&&enc==="UTF-8"){tryParse("Shift_JIS");return}
        try{
          const parsed=processCSV(text);
          if(!parsed.length){alert("銘柄データが読み取れませんでした");return}
          setHoldings(prev=>{
            const next=[...prev];
            parsed.forEach(p=>{
              const i=next.findIndex(x=>x.symbol===p.symbol&&x.broker===p.broker);
              if(i>=0)next[i]={...next[i],...p,id:next[i].id};
              else next.push(p);
            });
            return next;
          });
          setShowUpload(false);
        }catch(err){alert("読み込みエラー: "+err.message)}
      };
      reader.readAsText(file,enc);
    };
    tryParse("UTF-8");
  },[]);

  const onDrop=useCallback(e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0])},[handleFile]);

  const rows=holdings.map(h=>calc(h,prices,fx));
  const totalJPY=rows.reduce((s,h)=>s+(h.evalJPY||0),0);
  const totalPL=rows.reduce((s,h)=>s+(h.plJPY||0),0);
  const totalCost=rows.reduce((s,h)=>{
    const m=h.type==="trust"?h.quantity/10000:h.quantity;
    return s+(h.currency==="USD"?h.avgCost*m*(fx||150):h.avgCost*m);
  },0);
  const totalPct=totalCost>0?(totalPL/totalCost)*100:null;
  const ageStr=ageTs?(()=>{
    const m=Math.floor((Date.now()-ageTs)/60000);
    if(m<1)return"直前";if(m<60)return`${m}分前`;
    return`${Math.floor(m/60)}時間前`;
  })():null;

  if(!ready)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"#2d4a5a"}}>読み込み中…</div>);

  return(
    <div style={{minHeight:"100vh"}}>
      <header className="header">
        <div className="logo">
          <span style={{fontSize:"1.3rem"}}>🐋</span>
          <div>
            <div className="logo-t">PORTFOLIO</div>
            <div className="logo-s">期待値で鯨になる</div>
          </div>
        </div>
        <div className="hdr">
          {ageStr&&<span className="age">{ageStr}更新</span>}
          <button className="btn gh sm" onClick={()=>setShowAdd(true)}>＋</button>
          <button className="btn gh sm" onClick={()=>setShowUpload(true)}>📂</button>
          <button className="btn pr sm" onClick={refresh} disabled={loading||!holdings.length}>
            {loading?<span className="spin"/>:"🔄"} {loading?"取得中…":"価格更新"}
          </button>
        </div>
      </header>

      {holdings.length>0&&(
        <div className="sg">
          <Card label="評価額合計" main={`¥${fmt(totalJPY)}`} sub={fx?`USD/JPY ${fmt(fx,2)}`:null}/>
          <Card label="含み損益" main={`${totalPL>=0?"+":""}¥${fmt(totalPL)}`}
            sub={totalPct!=null?fmtPct(totalPct):null}
            color={totalPL>=0?"#22c55e":"#ef4444"}/>
          <Card label="銘柄数" main={`${holdings.length}銘柄`}
            sub={[...new Set(holdings.map(h=>h.broker))].join(" · ")}/>
        </div>
      )}

      <main>
        {progress&&(
          <div className="prog">🔄 取得中… {progress.done}/{progress.total}（{progress.sym}）</div>
        )}

        {!holdings.length?(
          <div className={`drop ${drag?"ov":""}`}
            onDragOver={e=>{e.preventDefault();setDrag(true)}}
            onDragLeave={()=>setDrag(false)}
            onDrop={onDrop}
            onClick={()=>setShowUpload(true)}>
            <div style={{fontSize:"2.5rem",marginBottom:"12px"}}>📊</div>
            <div style={{fontWeight:500,color:"#e2e8f0",marginBottom:"6px"}}>CSVをドロップ、またはタップ</div>
            <div style={{fontSize:".82rem",color:"#3a5568"}}>SBI / moomoo / 楽天 に対応</div>
          </div>
        ):(
          <div className="tw">
            <table>
              <thead><tr>
                <th className="tl">銘柄</th>
                <th className="tl">証券会社</th>
                <th>株数</th>
                <th>取得単価</th>
                <th>現在値</th>
                <th>評価額(円)</th>
                <th>評価額(USD)</th>
                <th>含み損益(円)</th>
                <th>損益率</th>
                <th></th>
              </tr></thead>
              <tbody>
                {rows.map(h=>{
                  const pos=h.plJPY!=null&&h.plJPY>=0;
                  const neg=h.plJPY!=null&&h.plJPY<0;
                  const tc={SBI:"ts",moomoo:"tm","楽天":"trr"}[h.broker]||"to";
                  const sym=yahooSym(h);
                  const failed=sym&&failedSyms.includes(sym);
                  return(
                    <tr key={h.id} className="row">
                      <td className="tl">
                        <div style={{fontWeight:500,color:"#f1f5f9",fontSize:".87rem"}}>{h.symbol}</div>
                        {h.name&&<div style={{fontSize:".68rem",color:"#3a5568",marginTop:"1px"}}>{h.name}</div>}
                        {failed&&<div className="fail-sym">取得失敗</div>}
                      </td>
                      <td className="tl"><span className={`tag ${tc}`}>{h.broker}</span></td>
                      <td className="mono">{fmt(h.quantity)}</td>
                      <td className="mono">
                        {h.avgCost?(h.currency==="USD"?`$${fmt(h.avgCost,2)}`:`¥${fmt(h.avgCost)}`):(<Dash/>)}
                      </td>
                      <td className="mono">
                        {h.currentPrice!=null
                          ?(h.currency==="USD"?`$${fmt(h.currentPrice,2)}`:h.type==="trust"?`¥${fmt(h.currentPrice,2)}`:`¥${fmt(h.currentPrice)}`)
                          :(<Dash/>)}
                      </td>
                      <td className="mono">{h.evalJPY!=null?`¥${fmt(h.evalJPY)}`:(<Dash/>)}</td>
                      <td className="mono">{h.evalUSD!=null?`$${fmt(h.evalUSD)}`:(<Dash/>)}</td>
                      <td className={`mono ${pos?"pos":neg?"neg":""}`}>
                        {h.plJPY!=null?`${h.plJPY>=0?"+":""}¥${fmt(h.plJPY)}`:(<Dash/>)}
                      </td>
                      <td className={`mono ${pos?"pos":neg?"neg":""}`}>
                        {h.plPct!=null?fmtPct(h.plPct):(<Dash/>)}
                      </td>
                      <td>
                        <button className="btn gh sm del"
                          onClick={()=>setHoldings(p=>p.filter(x=>x.id!==h.id))}>削除</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {holdings.some(h=>h.type==="trust")&&(
          <div className="notice">💡 投資信託の基準価額はAPIで取得できません。CSVを再読み込みで更新されます。</div>
        )}
        {failedSyms.length>0&&failedSyms.length<holdings.length&&(
          <div className="warn">⚠️ 取得失敗: {failedSyms.join(", ")}　―　再試行するか時間をおいてください。</div>
        )}
        {error&&<div className="err">⚠️ {error}</div>}
        <div className="notice" style={{marginTop:"14px",fontSize:".72rem"}}>
          📡 Yahoo Finance の非公式APIを使用。市場閉場中は前日終値が表示されます。
        </div>
      </main>

      {showUpload&&(
        <Modal onClose={()=>setShowUpload(false)}>
          <div className="mt">📂 CSV読み込み</div>
          <div className={`drop ${drag?"ov":""}`} style={{padding:"28px"}}
            onDragOver={e=>{e.preventDefault();setDrag(true)}}
            onDragLeave={()=>setDrag(false)}
            onDrop={onDrop}
            onClick={()=>fileRef.current.click()}>
            <div style={{fontSize:"1.8rem",marginBottom:"8px"}}>📂</div>
            <div style={{color:"#e2e8f0",fontWeight:500,marginBottom:"4px"}}>CSVをドロップ / タップして選択</div>
            <div style={{fontSize:".77rem",color:"#3a5568"}}>SBI / moomoo / 楽天 を自動判定 · UTF-8 / Shift-JIS 対応</div>
          </div>
          <input ref={fileRef} type="file" style={{display:"none"}}
            onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0])}}/>
          <div className="hint">
            <div>• SBI → 約定履歴照会 → CSV（拡張子問わず選択可）</div>
            <div>• SBI → 保有銘柄一覧 → CSVダウンロード（国内・米国・投信は別ファイル）</div>
            <div>• SBI → 保有銘柄一覧 → CSVダウンロード（国内・米国・投信は別ファイル）</div>
            <div>• moomoo → ポートフォリオ → エクスポート</div>
            <div>• 楽天 → 保有証券一覧 → CSV出力</div>
            <div>• 同一銘柄は上書き更新（重複しません）</div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:"14px"}}>
            <button className="btn gh" onClick={()=>setShowUpload(false)}>閉じる</button>
          </div>
        </Modal>
      )}
      {showAdd&&<AddModal onClose={()=>setShowAdd(false)} onAdd={h=>{setHoldings(p=>[...p,h]);setShowAdd(false)}}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
